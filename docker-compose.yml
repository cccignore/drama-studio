services:
  drama-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drama-studio
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DRAMA_DATA_DIR: /app/.data
      APP_SECRET: ${APP_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEFAULT_LLM_NAME: ${DEFAULT_LLM_NAME:-}
      DEFAULT_LLM_PROTOCOL: ${DEFAULT_LLM_PROTOCOL:-}
      DEFAULT_LLM_BASE_URL: ${DEFAULT_LLM_BASE_URL:-}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-}
      DEFAULT_LLM_API_KEY: ${DEFAULT_LLM_API_KEY:-}
    volumes:
      - ./data:/app/.data
